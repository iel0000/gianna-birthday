name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-progress deployment, but don't cancel runs already mid-flight.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          # Use the absolute base path GitHub Pages assigned this site.
          # For a project site this is /<repo>/, for a custom domain it is /.
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}/

          # EmailJS credentials — define these as repository secrets in
          # Settings → Secrets and variables → Actions. Leaving them unset
          # builds a working site where RSVPs save locally but no email fires.
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_GUEST_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_GUEST_TEMPLATE_ID }}
          VITE_EMAILJS_HOST_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_HOST_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_HOST_EMAIL: ${{ secrets.VITE_HOST_EMAIL }}
          VITE_SITE_URL: ${{ steps.pages.outputs.origin }}${{ steps.pages.outputs.base_path }}/

          # Supabase credentials — define these as repository secrets in
          # Settings → Secrets and variables → Actions. Leaving them unset
          # means RSVPs save locally only; nothing reaches the database.
          # These are public keys (safe to ship in the bundle); RLS in
          # supabase/schema.sql keeps the data private.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
